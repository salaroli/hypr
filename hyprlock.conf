background {
    monitor =
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 8
}

input-field {
    monitor =
    size = 300, 50
    position = 0, -80
    halign = center
    valign = center
    outline_thickness = 2
    rounding = 8
    placeholder_text = <i>Senha...</i>
    fade_on_empty = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    position = 0, 200
    halign = center
    valign = center
}
